[General]
# Настройка обхода включена
bypass-system = true
# Если true, при DNS-запросах возвращаются приватные IP адреса (например, из диапазона 192.168.x.x). При false Shadowrocket будет считать домен "захваченным" и принудительно отправит трафик через прокси, что может нарушать локальную сеть. Обычно лучше оставлять true.
private-ip-answer = true
# Пропуск специфических ip-адресов и доменов в зоне ru. Они будут идти без VPN
skip-proxy = 127.0.0.1, 172.16.0.0/12, localhost, \*.local, captive.apple.com
# Исключение диапазонов для обхода
bypass-tun = 100.64.0.0/10, 127.0.0.0/8, 169.254.0.0/16, 172.16.0.0/12, 192.0.0.0/24, 192.0.2.0/24, 192.88.99.0/24, 198.18.0.0/15, 198.51.100.0/24, 203.0.113.0/24, 224.0.0.0/4, 255.255.255.255/32
# ДНС сервера гугловые, но при этом если они не будут отвечать, то запрос будет идти через системные, через вашего провайдера
dns-server = https://pln-mrqmpan.duckdns.org/dns-query
fallback-dns-server = system
# Ссылка на обновление конфига
update-url = https://raw.githubusercontent.com/mrQmpan/scripts/refs/heads/main/shadowrocket.conf

[Rule]

IP-CIDR,192.168.0.0/24,Home Keenetic

